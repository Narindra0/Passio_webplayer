<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>Pass'io Web Player</title>
    <meta name="title" content="Pass'io Web Player — Lecteur de musique sécurisé" />
    <meta
      name="description"
      content="Écoutez votre musique en toute sécurité avec Pass'io Web Player. Streaming haute qualité, mode hors-ligne, et bibliothèque personnelle."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pass'io Web Player" />
    <meta
      property="og:description"
      content="Écoutez votre musique en toute sécurité avec Pass'io Web Player."
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Pass'io Web Player" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Pass'io" />
    <meta name="application-name" content="Pass'io" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link rel="icon" href="/assets/images/icon.png" sizes="32x32" />
    <link rel="icon" href="/assets/images/icon.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/assets/images/passio-icon-round.png" sizes="180x180" />

    <!-- PWA manifest (injected by vite-plugin-pwa) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Security headers are set by Cloudflare / public/_headers -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
